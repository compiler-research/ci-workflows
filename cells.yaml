# cells.yaml — single source of truth for what the recipe cache holds.
#
# Every entry under `cells:` is a (recipe, version, os, arch) tuple that
# publish-recipe.yml's push trigger will warm on every relevant push,
# and that prune-cache will *not* drop. Anything in Releases whose key
# doesn't correspond to an entry here is an orphan and gets pruned
# after `caps.grace_days`.
#
# Editing this file:
#   - Add a row → next push to main warms it (or just dispatch
#     publish-recipe manually).
#   - Remove a row → next push to main prunes the asset after the
#     grace period (so in-flight PRs that still reference the old key
#     don't break mid-run).
#   - Change build inputs (recipe directory content) → the cache key
#     moves; the old asset becomes an orphan, the new one gets warmed.

# Major LLVM versions we currently support. Informational here;
# package-catchup-probe will key off this list.
support_window:
  - 20
  - 22

caps:
  # Soft cap: prune-cache emits ::warning:: when total Release storage
  # is over this. Hard cap: workflow fails. Grace days: how long to
  # leave an orphan asset around so in-flight PRs don't break when
  # the cell is removed from this file or the recipe content changes.
  soft_gb: 20
  hard_gb: 30
  grace_days: 7

cells:
  - { recipe: llvm-asan, version: '22',            os: ubuntu-24.04,    arch: x86_64 }
  # llvm-release: vanilla LLVM/Clang for the latest major across every
  # supported runner image. setup-llvm's default flavor pulls these
  # cells; consumers asking for older majors pick `flavor: system`,
  # which goes through the platform package manager and needs no cell.
  # When LLVM 23 ships, bump the version on these rows; the LLVM 22
  # cells age out via prune-cache after grace_days.
  - { recipe: llvm-release, version: '22',         os: ubuntu-24.04,     arch: x86_64 }
  - { recipe: llvm-release, version: '22',         os: ubuntu-24.04-arm, arch: arm64  }
  - { recipe: llvm-release, version: '22',         os: macos-26,         arch: arm64  }
  - { recipe: llvm-release, version: '22',         os: macos-26-intel,   arch: x86_64 }
  - { recipe: llvm-release, version: '22',         os: windows-2025,     arch: x86_64 }
  - { recipe: llvm-release, version: '22',         os: windows-11-arm,   arch: arm64  }
  # llvm-root: `version` doubles as a flavor selector and substitutes
  # into recipes/llvm-root/recipe.yaml's branch_template. Two flavors
  # track root-project/llvm-project's paired branches:
  #   cling-llvm20 = cling's patches alone (CppInterOp's cppyy/cling row).
  #                  Linux-only today; macOS / Windows cling rows still
  #                  share the ROOT-llvm20 superset to keep one cell warm.
  #   ROOT-llvm20  = cling + ROOT's extra clang patches. Built across
  #                  the full CppInterOp matrix so every cling-using
  #                  consumer has a ready cell.
  - { recipe: llvm-root, version: 'cling-llvm20',  os: ubuntu-24.04,    arch: x86_64 }
  - { recipe: llvm-root, version: 'ROOT-llvm20',   os: ubuntu-24.04,    arch: x86_64 }
  - { recipe: llvm-root, version: 'ROOT-llvm20',   os: macos-26,        arch: arm64  }
  - { recipe: llvm-root, version: 'ROOT-llvm20',   os: macos-26-intel,  arch: x86_64 }
  - { recipe: llvm-root, version: 'ROOT-llvm20',   os: windows-2025,    arch: x86_64 }
