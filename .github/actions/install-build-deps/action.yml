name: 'Install build dependencies'
description: |
  Installs the host-side packages a recipe build needs (ninja, zstd,
  ccache, rsync) and a Clang host toolchain. Pulled out of
  publish-recipe.yml so the dispatch and push jobs share the same
  install logic.

  Why Clang: recipes that set LLVM_USE_SANITIZER (e.g. llvm-asan)
  rely on Clang-specific UBSan flags such as `-fno-sanitize=function`
  and `-fsanitize-blacklist=`, which gcc rejects. Forcing Clang as
  the host compiler keeps every recipe on a uniformly-supported
  toolchain rather than picking up whatever the runner image's
  default `c++` happens to be (gcc on Ubuntu).

  macOS already provides Clang via the Xcode CLT preinstalled on
  GHA runners; we just point CC/CXX at it explicitly.

  Windows: pins CC/CXX to cl; MSVC's developer environment itself
  (cl.exe on PATH, LIB/INCLUDE populated) is provisioned by the
  publish-recipe action, which selects the toolchain matching the
  cell's target arch. Without that env GHA's hosted Windows runners
  default to MinGW g++ from chocolatey, which rejects MSVC-only
  constructs that LLVM and cling depend on (`_MSC_VER`, MSVC-style
  LPTSTR/TCHAR semantics, `#pragma comment(lib, ...)`).

runs:
  using: composite
  steps:
    - name: Install build dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        # libedit-dev so LLVM's HAVE_LIBEDIT is on; LLVMLineEditor is a
        # link dependency of cling's UserInterface (root-project/cling
        # 9cdffe0c44 LineEditor migration).
        sudo apt-get install -y cmake ninja-build zstd ccache rsync clang libedit-dev
        # Pin the host compiler for every subsequent step in this job.
        echo "CC=clang" >> "$GITHUB_ENV"
        echo "CXX=clang++" >> "$GITHUB_ENV"

    - name: Install build dependencies (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        # libedit ships with macOS's libc; no brew package needed for it.
        brew install ninja zstd ccache rsync
        echo "CC=clang" >> "$GITHUB_ENV"
        echo "CXX=clang++" >> "$GITHUB_ENV"

    - name: Install build dependencies (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        choco install -y ninja zstandard ccache
        # Pin the host compiler. cl lands on PATH via publish-recipe's
        # MSVC step (which knows the cell's target arch) before any
        # compile runs. cmake -G Ninja honors these.
        echo "CC=cl" >> "$GITHUB_ENV"
        echo "CXX=cl" >> "$GITHUB_ENV"
