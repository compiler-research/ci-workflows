name: prune-cache

# Converges the Releases cache to what cells.yaml says should be there.
# Runs after every successful publish-recipe completion (so newly
# uploaded assets exist in their canonical key form before pruning),
# plus weekly on a schedule as a watchdog, plus manually.
#
# Algorithm:
#   1. Compute expected_keys = { compute-key for each cell in cells.yaml }.
#   2. List existing assets on the rolling Release.
#   3. orphans = existing − expected.
#   4. Protect orphans that are the *last usable asset of a live cell*:
#      a cell still in cells.yaml whose current-key asset has not been
#      (re)published yet. This protection is unconditional — even
#      force=true honours it — because dropping such an orphan would
#      leave the cell with zero artifacts and break every consumer.
#   5. Drop the remaining orphans whose age > caps.grace_days (so
#      in-flight PRs that reference an old key aren't broken mid-run by
#      the prune). On a manual run with force=true, grace is treated as
#      zero and every unprotected orphan drops immediately.
#   6. Tally remaining storage; warn over caps.soft_gb, fail over
#      caps.hard_gb.
#
# What grace_days protects: when a recipe build.sh is edited, the
# cache key for every affected cell moves. The next push warms the new
# keys; the old assets become orphans. A PR opened a day before the
# edit and tested a day after still references the old key and pulls
# the old asset. Holding orphans for `grace_days` (default 7) lets
# those in-flight PRs finish before the asset disappears. The `force`
# input bypasses grace — but not the step-4 last-usable-asset
# protection — so it only evicts orphans that are safe to lose.
#
# Why step 4 exists: grace_days is a *time* bet that the new-key asset
# lands within the window. Per-cell publish is best-effort
# (fail-fast: false) and the slowest/flakiest cells (e.g. Windows LLVM)
# can miss it; the weekly watchdog would then evict the old asset while
# the new one never arrived, taking the cell to zero. Step 4 converts
# that outage into graceful degradation: the cell keeps serving its
# previous artifact until the current key is published.
on:
  workflow_run:
    workflows: [publish-recipe]
    types: [completed]
  schedule:
    # Weekly watchdog. UTC; pick a low-traffic time.
    - cron: '17 4 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force-drop every orphan now (bypass caps.grace_days). Use only when intentionally evicting in-flight keys.'
        type: boolean
        default: false

permissions:
  contents: write   # delete release assets

jobs:
  prune:
    # Don't prune on a *failed* publish-recipe run — bad data could mean
    # we'd evict still-needed assets. The schedule and dispatch paths
    # always run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    env:
      # Only the manual workflow_dispatch path can set force=true. The
      # grace check is bypassed for that single run; the schedule and
      # workflow_run triggers always honour caps.grace_days.
      FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force == true }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute expected keys
        id: expected
        run: |
          set -euo pipefail
          : > /tmp/expected_keys.txt
          while IFS= read -r cell; do
            [ -z "$cell" ] && continue
            recipe=$(echo "$cell" | jq -r .recipe)
            version=$(echo "$cell" | jq -r .version)
            os=$(echo "$cell"     | jq -r .os)
            arch=$(echo "$cell"   | jq -r .arch)
            key=$(python3 actions/setup-recipe/compute_key.py \
                    "$recipe" "$version" "$os" "$arch" | sed 's/^key=//')
            echo "$key" >> /tmp/expected_keys.txt
          done < <(yq -o=json -I=0 '.cells[]' cells.yaml)
          sort -u -o /tmp/expected_keys.txt /tmp/expected_keys.txt
          n=$(wc -l < /tmp/expected_keys.txt | tr -d ' ')
          echo "::notice::expected $n key(s) from cells.yaml"
          cat /tmp/expected_keys.txt

      - name: List existing release assets
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # No Release yet → nothing to prune. Exit cleanly.
          if ! gh release view cache -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::notice::no 'cache' release yet; nothing to prune"
            : > /tmp/existing_assets.jsonl
            exit 0
          fi
          # `--jq` over `.assets[]` flattens to one JSON object per line.
          gh release view cache -R "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[] | {name, size, createdAt}' \
            > /tmp/existing_assets.jsonl
          n=$(wc -l < /tmp/existing_assets.jsonl | tr -d ' ')
          echo "::notice::found $n asset(s) on cache release"

      - name: Compute orphans + drop those past grace
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ ! -s /tmp/existing_assets.jsonl ]; then
            echo "::notice::no existing assets; nothing to do"
            exit 0
          fi
          # An empty expected_keys with non-empty existing assets is
          # almost certainly upstream tooling failure (yq/jq/compute_key).
          # Without this guard the orphan classifier drops every cell.
          if [ ! -s /tmp/expected_keys.txt ]; then
            echo "::error::expected_keys.txt is empty but assets exist; refusing to prune."
            exit 1
          fi
          grace_days=$(yq '.caps.grace_days' cells.yaml)
          if [ "$FORCE" = 'true' ]; then
            echo "::notice::force=true: bypassing grace period (was ${grace_days} days)"
            grace_days=0
          fi
          # Pre-list existing asset names so delete-asset only fires for
          # files actually on the release; avoids "asset X not found"
          # noise for sibling files that legitimately don't exist
          # (Windows cells skip the .ccache.tar.zst sibling).
          asset_names=/tmp/asset_names.txt
          jq -r .name /tmp/existing_assets.jsonl > "$asset_names"
          # --- Last-usable-asset protection (step 4) -------------------------
          # A cell's "tuple prefix" is its key minus the trailing -<hash>.
          # recipe/version/os/arch may contain '-', but compute_key's hash
          # never does, so ${key%-*} is exactly the cell tuple.
          #   live_tuples      = tuple of every cell in cells.yaml.
          #   satisfied_tuples = live cells whose current-key asset is already
          #                      present (their orphans are true duplicates).
          # An orphan of a live-but-unsatisfied tuple is the cell's only
          # surviving artifact and must not be dropped.
          while IFS= read -r k; do echo "${k%-*}"; done \
            < /tmp/expected_keys.txt | sort -u > /tmp/live_tuples.txt
          sed -E 's/\.(ccache\.tar\.zst|tar\.zst|manifest\.json)$//' \
            "$asset_names" | sort -u > /tmp/existing_keys.txt
          grep -Fxf /tmp/expected_keys.txt /tmp/existing_keys.txt 2>/dev/null \
            | while IFS= read -r k; do echo "${k%-*}"; done \
            | sort -u > /tmp/satisfied_tuples.txt || true
          delete_if_exists() {
            local n="$1"
            if grep -qxF "$n" "$asset_names"; then
              gh release delete-asset cache "$n" \
                -R "$GITHUB_REPOSITORY" --yes \
                || echo "::warning::failed to delete $n; will retry next prune"
            fi
          }
          now=$(date -u +%s)
          # The same key surfaces once per sibling filename (.tar.zst
          # AND .ccache.tar.zst on Linux/macOS). Dedup so the orphan /
          # kept tallies and the delete loop run once per unique key.
          declare -A seen=()
          dropped=0
          kept=0
          while IFS= read -r asset; do
            name=$(echo "$asset" | jq -r .name)
            case "$name" in
              *.ccache.tar.zst) key="${name%.ccache.tar.zst}" ;;
              *.tar.zst)        key="${name%.tar.zst}" ;;
              *.manifest.json)  continue ;;
              *)                echo "::warning::unexpected asset: $name"; continue ;;
            esac
            [ -n "${seen[$key]:-}" ] && continue
            seen[$key]=1
            if grep -qxF "$key" /tmp/expected_keys.txt; then
              kept=$((kept + 1))
              continue
            fi
            # Protect the last usable asset of a live cell (unconditional,
            # even under force): the cell is still declared but its
            # current-key asset hasn't been published yet, so this orphan
            # is all that stands between consumers and a hard failure.
            tuple="${key%-*}"
            if grep -qxF "$tuple" /tmp/live_tuples.txt \
                && ! grep -qxF "$tuple" /tmp/satisfied_tuples.txt; then
              echo "::warning::keeping sole surviving asset for live cell '$tuple' (current-key artifact not yet published): $key"
              kept=$((kept + 1))
              continue
            fi
            created=$(echo "$asset" | jq -r .createdAt)
            created_epoch=$(date -u -d "$created" +%s 2>/dev/null || true)
            if [ -z "$created_epoch" ]; then
              echo "::warning::could not parse createdAt='$created' for $key; keeping"
              kept=$((kept + 1))
              continue
            fi
            age_days=$(( (now - created_epoch) / 86400 ))
            if [ "$age_days" -lt "$grace_days" ]; then
              echo "::notice::orphan within grace ($age_days/$grace_days days): $key"
              kept=$((kept + 1))
              continue
            fi
            echo "::notice::dropping orphan ($age_days days old): $key"
            delete_if_exists "${key}.tar.zst"
            delete_if_exists "${key}.ccache.tar.zst"
            delete_if_exists "${key}.manifest.json"
            dropped=$((dropped + 1))
          done < /tmp/existing_assets.jsonl
          echo "::notice::prune summary: dropped=$dropped kept=$kept"

      - name: Enforce caps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view cache -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi
          soft=$(yq '.caps.soft_gb' cells.yaml)
          hard=$(yq '.caps.hard_gb' cells.yaml)
          total_bytes=$(gh release view cache -R "$GITHUB_REPOSITORY" \
            --json assets --jq '[.assets[].size] | add // 0')
          # Convert to GB (binary GiB so 1024^3 — close enough for caps).
          total_gb=$(( total_bytes / 1073741824 ))
          echo "::notice::cache size: ${total_gb} GiB (soft cap ${soft}, hard cap ${hard})"
          if [ "$total_gb" -gt "$hard" ]; then
            echo "::error::cache size ${total_gb} GiB exceeds hard cap ${hard} GiB"
            exit 1
          fi
          if [ "$total_gb" -gt "$soft" ]; then
            echo "::warning::cache size ${total_gb} GiB exceeds soft cap ${soft} GiB"
          fi
