name: publish-recipe

# Three trigger paths:
#   workflow_dispatch — operator-driven, single cell from inputs.
#   push to main      — auto-warm the recipe cache after a merge that
#                       touched the recipe directory or actions. The
#                       push matrix is derived from cells.yaml; a
#                       preflight job reads cells.yaml, probes the
#                       Releases cache for each cell, and emits *only*
#                       the cells whose key is missing. So the
#                       steady-state cost on a no-op push is one
#                       preflight runner (~30 s) and zero per-cell
#                       runners.
#   pull_request      — validate the recipe builds end-to-end before
#                       merge, against the proposed content. Same
#                       per-cell matrix; calls publish-recipe with
#                       dry-run=true (no manifest, no upload, no
#                       Release creation). The ccache-action restore
#                       picks up the coarse-keyed cache from main, so
#                       a PR that only edits build flags rebuilds in
#                       minutes rather than the half-hour cold cost.
on:
  workflow_dispatch:
    inputs:
      recipe:
        type: choice
        required: true
        options:
          - llvm-asan
      version:
        type: string
        required: true
        default: '22'
      os:
        type: choice
        required: true
        options:
          - ubuntu-24.04
        default: ubuntu-24.04
      arch:
        type: choice
        required: true
        options:
          - x86_64
        default: x86_64
  push:
    branches: [main]
    paths: &trigger_paths
      - 'cells.yaml'
      - 'recipes/**'
      - 'actions/setup-recipe/**'
      - 'actions/publish-recipe/**'
      # actions/lib/ holds shared Python that drives every recipe's
      # build (install-distribution component list, smoke checks).
      # Changes there don't move the cache key (key hashes only the
      # recipe directory), so they need the operator to invalidate
      # affected cells manually -- but we still want a build to RUN
      # so the new artifact is uploaded once invalidation happens.
      - 'actions/lib/**'
      - '.github/workflows/publish-recipe.yml'
  pull_request:
    paths: *trigger_paths

permissions:
  contents: write   # release upload

jobs:
  publish-dispatch:
    if: github.event_name == 'workflow_dispatch'
    # No templated `name:`. When the gate is false (push / pull_request),
    # GitHub still enumerates the job and renders any `${{ inputs.* }}`
    # in `name:` literally, producing a phantom Skipped row that reads
    # like a real failure. Letting GHA fall back to the job id keeps the
    # Skipped row clean.
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      - uses: ./actions/publish-recipe
        with:
          recipe: ${{ inputs.recipe }}
          version: ${{ inputs.version }}
          os: ${{ inputs.os }}
          arch: ${{ inputs.arch }}

  read-cells:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    outputs:
      # Matrix `include:` JSON. Empty when every cell is already
      # published — the publish-on-push job skips itself in that case.
      matrix: ${{ steps.compute.outputs.matrix }}
      empty: ${{ steps.compute.outputs.empty }}
    steps:
      - uses: actions/checkout@v4
      - id: compute
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          todo=()
          # `yq -o=json -I=0 '.cells[]'` emits one compact JSON object per
          # cell, one per line — safe to read with `while IFS= read -r`.
          while IFS= read -r cell; do
            [ -z "$cell" ] && continue
            recipe=$(echo "$cell" | jq -r .recipe)
            version=$(echo "$cell" | jq -r .version)
            os=$(echo "$cell"     | jq -r .os)
            arch=$(echo "$cell"   | jq -r .arch)
            key=$(python3 actions/setup-recipe/compute_key.py \
                    "$recipe" "$version" "$os" "$arch" | sed 's/^key=//')
            url="https://github.com/${REPO}/releases/download/cache/${key}.tar.zst"
            if curl -fsLI "$url" >/dev/null 2>&1; then
              echo "::notice::cache hit, skipping: ${key}"
            else
              echo "::notice::needs build: ${key}"
              todo+=("$cell")
            fi
          done < <(yq -o=json -I=0 '.cells[]' cells.yaml)

          if [ ${#todo[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "empty=true" >> "$GITHUB_OUTPUT"
            echo "::notice::all cells already cached; no per-cell jobs to spawn"
          else
            matrix=$(printf '%s\n' "${todo[@]}" | jq -s -c '{include: .}')
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "empty=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${#todo[@]} cell(s) to (re)build"
          fi

  publish-on-push:
    needs: read-cells
    if: github.event_name == 'push' && needs.read-cells.outputs.empty != 'true'
    # No templated `name:`. Same reason as publish-dispatch: on the
    # pull_request trigger this job is skipped, and a `${{ matrix.* }}`
    # template in `name:` would render unresolved on the Skipped row.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.read-cells.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      - uses: ./actions/publish-recipe
        with:
          recipe: ${{ matrix.recipe }}
          version: ${{ matrix.version }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

  # PR validation: build every cell in cells.yaml against the
  # proposed recipe content. dry-run=true skips the manifest,
  # the tar/zstd, the Release upload, and the gh release create
  # (PR runs from forks lack write access anyway). The ccache-action
  # restore in the action picks up the coarse-keyed cache that the
  # last push-on-main warmed; a PR that only edits build flags
  # rebuilds in minutes.
  #
  # Reuses the cells.yaml matrix shape via a sibling preflight so
  # the matrix evolves in lockstep with the publish path. We do NOT
  # run the skip-if-exists probe at workflow level for PRs --
  # publish-recipe's own skip step still no-ops when the PR's
  # content hash matches what's already on main, which is the
  # cheap path for "PR didn't change the recipe".
  validate-pr-cells:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
      empty: ${{ steps.compute.outputs.empty }}
    steps:
      - uses: actions/checkout@v4
      - id: compute
        run: |
          set -euo pipefail
          # yq emits one JSON object per cell; jq wraps the array as
          # {include: [...]} for the matrix consumer below.
          # `{include: .cells}` directly in yq isn't portable across
          # mikefarah/yq versions -- the `{...}` constructor with a
          # bare key changes shape between v4 minors.
          matrix=$(yq -o=json -I=0 '.cells[]' cells.yaml | jq -s -c '{include: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          n=$(yq '.cells | length' cells.yaml)
          if [ "$n" = "0" ]; then
            echo "empty=true"  >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

  validate-on-pr:
    needs: validate-pr-cells
    if: github.event_name == 'pull_request' && needs.validate-pr-cells.outputs.empty != 'true'
    # No templated `name:`. Same reason as publish-on-push: on the push
    # trigger this job is skipped, and a `${{ matrix.* }}` template in
    # `name:` would render unresolved on the Skipped row.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-pr-cells.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      - uses: ./actions/publish-recipe
        with:
          recipe: ${{ matrix.recipe }}
          version: ${{ matrix.version }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          dry-run: 'true'
