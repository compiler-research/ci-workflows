name: publish-recipe

# Three trigger paths:
#   workflow_dispatch — operator-driven, single cell from inputs.
#   push to main      — auto-warm the recipe cache after a merge that
#                       touched the recipe directory or actions. The
#                       push matrix is derived from cells.yaml; a
#                       preflight job reads cells.yaml, probes the
#                       Releases cache for each cell, and emits *only*
#                       the cells whose key is missing. So the
#                       steady-state cost on a no-op push is one
#                       preflight runner (~30 s) and zero per-cell
#                       runners.
#   pull_request      — validate the recipe builds end-to-end before
#                       merge, against the proposed content. Same
#                       per-cell matrix; calls publish-recipe with
#                       dry-run=true (no manifest, no upload, no
#                       Release creation). The ccache-action restore
#                       picks up the coarse-keyed cache from main, so
#                       a PR that only edits build flags rebuilds in
#                       minutes rather than the half-hour cold cost.
on:
  workflow_dispatch:
    # Reissue any single cell declared in cells.yaml. Inputs are free-form
    # strings (not hardcoded choices that drift from cells.yaml); the
    # dispatch-validate job rejects anything that isn't a declared cell, so
    # "supported" == "in cells.yaml" -- every matrix entry, every OS/arch.
    inputs:
      recipe:
        description: 'Recipe as in cells.yaml (e.g. llvm-release, llvm-asan, llvm-root, llvm-wasm).'
        type: string
        required: true
      version:
        description: "Version/flavor as in cells.yaml (e.g. '22', 'ROOT-llvm20', 'cling-llvm20')."
        type: string
        required: true
        default: '22'
      os:
        description: 'Runner OS as in cells.yaml (e.g. ubuntu-24.04, windows-2025, macos-26, ubuntu-24.04-arm).'
        type: string
        required: true
        default: ubuntu-24.04
      arch:
        description: 'Arch as in cells.yaml (x86_64 or arm64).'
        type: string
        required: true
        default: x86_64
      force:
        description: 'Rebuild and overwrite even if the cell is already published (otherwise a present asset is left untouched).'
        type: boolean
        required: false
        default: false
  push:
    branches: [main]
    paths: &trigger_paths
      - 'cells.yaml'
      - 'recipes/**'
      - 'actions/setup-recipe/**'
      - 'actions/publish-recipe/**'
      # actions/lib/ holds shared Python that drives every recipe's
      # build (install-distribution component list, smoke checks).
      # Changes there don't move the cache key (key hashes only the
      # recipe directory), so they need the operator to invalidate
      # affected cells manually -- but we still want a build to RUN
      # so the new artifact is uploaded once invalidation happens.
      - 'actions/lib/**'
      - '.github/workflows/publish-recipe.yml'
  pull_request:
    paths: *trigger_paths

permissions:
  contents: write   # release upload

jobs:
  # Validate the requested cell on a cheap Linux runner before allocating
  # the (possibly Windows/macOS/arm) target runner. "Supported" means the
  # exact {recipe, version, os, arch} tuple is declared in cells.yaml.
  dispatch-validate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Reject cells not declared in cells.yaml
        env:
          RECIPE: ${{ inputs.recipe }}
          VERSION: ${{ inputs.version }}
          OS: ${{ inputs.os }}
          ARCH: ${{ inputs.arch }}
        run: |
          set -euo pipefail
          match=$(yq -o=json -I=0 '.cells[]' cells.yaml \
            | jq -rc --arg r "$RECIPE" --arg v "$VERSION" \
                     --arg o "$OS" --arg a "$ARCH" \
                'select(.recipe==$r and (.version|tostring)==$v
                        and .os==$o and .arch==$a)')
          if [ -z "$match" ]; then
            echo "::error::{recipe=$RECIPE version=$VERSION os=$OS arch=$ARCH} is not a cell in cells.yaml"
            {
              echo "Supported cells (recipe version os arch):"
              yq -o=json -I=0 '.cells[]' cells.yaml \
                | jq -r '"  \(.recipe) \(.version) \(.os) \(.arch)"'
            } >&2
            exit 1
          fi
          echo "::notice::reissuing supported cell: $RECIPE $VERSION $OS $ARCH"

  publish-dispatch:
    if: github.event_name == 'workflow_dispatch'
    needs: dispatch-validate
    # No templated `name:`. When the gate is false (push / pull_request),
    # GitHub still enumerates the job and renders any `${{ inputs.* }}`
    # in `name:` literally, producing a phantom Skipped row that reads
    # like a real failure. Letting GHA fall back to the job id keeps the
    # Skipped row clean.
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      - uses: ./actions/publish-recipe
        with:
          recipe: ${{ inputs.recipe }}
          version: ${{ inputs.version }}
          os: ${{ inputs.os }}
          arch: ${{ inputs.arch }}
          force: ${{ inputs.force }}

  read-cells:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    outputs:
      # Two matrices. Bootstrap cells = recipes without a `bootstrap:`
      # field in recipe.yaml (build standalone). Dependent cells =
      # recipes that declare a bootstrap; they must wait for their
      # provider's cell to be in cache. Empty flag short-circuits the
      # paired publish-on-push-* job when nothing needs building.
      bootstrap_matrix: ${{ steps.compute.outputs.bootstrap_matrix }}
      dependent_matrix: ${{ steps.compute.outputs.dependent_matrix }}
      bootstrap_empty:  ${{ steps.compute.outputs.bootstrap_empty }}
      dependent_empty:  ${{ steps.compute.outputs.dependent_empty }}
    steps:
      - uses: actions/checkout@v4
      - id: compute
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          bootstraps=()
          dependents=()
          # `yq -o=json -I=0 '.cells[]'` emits one compact JSON object per
          # cell, one per line — safe to read with `while IFS= read -r`.
          while IFS= read -r cell; do
            [ -z "$cell" ] && continue
            recipe=$(echo "$cell" | jq -r .recipe)
            version=$(echo "$cell" | jq -r .version)
            os=$(echo "$cell"     | jq -r .os)
            arch=$(echo "$cell"   | jq -r .arch)
            key=$(python3 actions/setup-recipe/compute_key.py \
                    "$recipe" "$version" "$os" "$arch" | sed 's/^key=//')
            url="https://github.com/${REPO}/releases/download/cache/${key}.tar.zst"
            if curl -fsLI "$url" >/dev/null 2>&1; then
              echo "::notice::cache hit, skipping: ${key}"
              continue
            fi
            echo "::notice::needs build: ${key}"
            # Cells whose recipe declares `bootstrap:` depend on the
            # bootstrap provider's cell being in cache (fetch_bootstrap
            # probes Releases). Split here so bootstrap cells get warmed
            # before any dependent cell tries to fetch them.
            if yq -e '.bootstrap' "recipes/$recipe/recipe.yaml" >/dev/null 2>&1; then
              dependents+=("$cell")
            else
              bootstraps+=("$cell")
            fi
          done < <(yq -o=json -I=0 '.cells[]' cells.yaml)

          if [ ${#bootstraps[@]} -eq 0 ]; then
            echo "bootstrap_matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "bootstrap_empty=true"              >> "$GITHUB_OUTPUT"
          else
            m=$(printf '%s\n' "${bootstraps[@]}" | jq -s -c '{include: .}')
            echo "bootstrap_matrix=${m}"  >> "$GITHUB_OUTPUT"
            echo "bootstrap_empty=false"  >> "$GITHUB_OUTPUT"
          fi
          if [ ${#dependents[@]} -eq 0 ]; then
            echo "dependent_matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "dependent_empty=true"              >> "$GITHUB_OUTPUT"
          else
            m=$(printf '%s\n' "${dependents[@]}" | jq -s -c '{include: .}')
            echo "dependent_matrix=${m}"  >> "$GITHUB_OUTPUT"
            echo "dependent_empty=false"  >> "$GITHUB_OUTPUT"
          fi

          tot=$((${#bootstraps[@]} + ${#dependents[@]}))
          if [ "$tot" -eq 0 ]; then
            echo "::notice::all cells already cached; no per-cell jobs to spawn"
          else
            echo "::notice::${#bootstraps[@]} bootstrap + ${#dependents[@]} dependent cell(s) to (re)build"
          fi

  publish-on-push-bootstrap:
    needs: read-cells
    if: github.event_name == 'push' && needs.read-cells.outputs.bootstrap_empty != 'true'
    # No templated `name:`. Same reason as publish-dispatch: on the
    # pull_request trigger this job is skipped, and a `${{ matrix.* }}`
    # template in `name:` would render unresolved on the Skipped row.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.read-cells.outputs.bootstrap_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      - uses: ./actions/publish-recipe
        with:
          recipe: ${{ matrix.recipe }}
          version: ${{ matrix.version }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

  publish-on-push-dependent:
    # Wait for the bootstrap phase even when it has nothing to do
    # (`success() || skipped()`) -- dependents may still need to run.
    # If a bootstrap leg failed, don't start dependents that would
    # immediately fetch_bootstrap-miss against an unpublished provider.
    needs: [read-cells, publish-on-push-bootstrap]
    if: |
      github.event_name == 'push' &&
      needs.read-cells.outputs.dependent_empty != 'true' &&
      (needs.publish-on-push-bootstrap.result == 'success' ||
       needs.publish-on-push-bootstrap.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.read-cells.outputs.dependent_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      - uses: ./actions/publish-recipe
        with:
          recipe: ${{ matrix.recipe }}
          version: ${{ matrix.version }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

  # PR validation: build every cell in cells.yaml against the
  # proposed recipe content. dry-run=true skips the manifest,
  # the tar/zstd, the Release upload, and the gh release create
  # (PR runs from forks lack write access anyway). The ccache-action
  # restore in the action picks up the coarse-keyed cache that the
  # last push-on-main warmed; a PR that only edits build flags
  # rebuilds in minutes.
  #
  # Reuses the cells.yaml matrix shape via a sibling preflight so
  # the matrix evolves in lockstep with the publish path. We do NOT
  # run the skip-if-exists probe at workflow level for PRs --
  # publish-recipe's own skip step still no-ops when the PR's
  # content hash matches what's already on main, which is the
  # cheap path for "PR didn't change the recipe".
  #
  # Bootstrap/dependent split mirrors read-cells on push: a PR that
  # shifts a bootstrap recipe's content hash needs its dependents
  # to read the just-built cell from the bootstrap leg's artifact,
  # because Releases doesn't have the new-keyed cell yet.
  validate-pr-cells:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    outputs:
      bootstrap_matrix: ${{ steps.compute.outputs.bootstrap_matrix }}
      dependent_matrix: ${{ steps.compute.outputs.dependent_matrix }}
      bootstrap_empty:  ${{ steps.compute.outputs.bootstrap_empty }}
      dependent_empty:  ${{ steps.compute.outputs.dependent_empty }}
    steps:
      - uses: actions/checkout@v4
      - id: compute
        run: |
          set -euo pipefail
          bootstraps=()
          dependents=()
          while IFS= read -r cell; do
            [ -z "$cell" ] && continue
            recipe=$(echo "$cell" | jq -r .recipe)
            if yq -e '.bootstrap' "recipes/$recipe/recipe.yaml" >/dev/null 2>&1; then
              dependents+=("$cell")
            else
              bootstraps+=("$cell")
            fi
          done < <(yq -o=json -I=0 '.cells[]' cells.yaml)

          if [ ${#bootstraps[@]} -eq 0 ]; then
            echo "bootstrap_matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "bootstrap_empty=true"              >> "$GITHUB_OUTPUT"
          else
            m=$(printf '%s\n' "${bootstraps[@]}" | jq -s -c '{include: .}')
            echo "bootstrap_matrix=${m}"  >> "$GITHUB_OUTPUT"
            echo "bootstrap_empty=false"  >> "$GITHUB_OUTPUT"
          fi
          if [ ${#dependents[@]} -eq 0 ]; then
            echo "dependent_matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "dependent_empty=true"              >> "$GITHUB_OUTPUT"
          else
            m=$(printf '%s\n' "${dependents[@]}" | jq -s -c '{include: .}')
            echo "dependent_matrix=${m}"  >> "$GITHUB_OUTPUT"
            echo "dependent_empty=false"  >> "$GITHUB_OUTPUT"
          fi

  validate-on-pr-bootstrap:
    needs: validate-pr-cells
    if: github.event_name == 'pull_request' && needs.validate-pr-cells.outputs.bootstrap_empty != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-pr-cells.outputs.bootstrap_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      - uses: ./actions/publish-recipe
        with:
          recipe: ${{ matrix.recipe }}
          version: ${{ matrix.version }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          dry-run: 'true'
      # Stage <key>.tar.zst into the artifact dir. If publish-recipe
      # built fresh (PR shifted the bootstrap), pack the install tree;
      # if it took the skip-if-exists path (PR didn't shift it), the
      # cell is already on Releases -- fetch it so dependents still
      # find it via the same file:// path.
      - name: Stage bootstrap asset
        if: needs.validate-pr-cells.outputs.dependent_empty != 'true'
        shell: bash
        env:
          RECIPE: ${{ matrix.recipe }}
          VERSION: ${{ matrix.version }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          key=$(python3 actions/setup-recipe/compute_key.py \
                  "$RECIPE" "$VERSION" "$OS" "$ARCH" | sed 's/^key=//')
          mkdir -p _pr_bootstrap_cache
          if [[ -d "$GITHUB_WORKSPACE/_recipe_out/install" ]]; then
            python3 actions/lib/cache_io.py pack \
              "$GITHUB_WORKSPACE/_recipe_out" "$key" \
              "$GITHUB_WORKSPACE/_pr_bootstrap_cache"
          else
            curl -fL -o "_pr_bootstrap_cache/${key}.tar.zst" \
              "https://github.com/${REPO}/releases/download/cache/${key}.tar.zst"
          fi
      - uses: actions/upload-artifact@v4
        if: needs.validate-pr-cells.outputs.dependent_empty != 'true'
        with:
          # One artifact per cell; dependents flatten them into one dir.
          name: pr-bootstrap-${{ matrix.recipe }}-${{ matrix.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: _pr_bootstrap_cache/

  validate-on-pr-dependent:
    # Also run when the bootstrap leg was skipped (PR didn't touch
    # any bootstrap recipe) -- Releases satisfies fetch_bootstrap then.
    needs: [validate-pr-cells, validate-on-pr-bootstrap]
    if: |
      github.event_name == 'pull_request' &&
      needs.validate-pr-cells.outputs.dependent_empty != 'true' &&
      (needs.validate-on-pr-bootstrap.result == 'success' ||
       needs.validate-on-pr-bootstrap.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-pr-cells.outputs.dependent_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      # Flatten every pr-bootstrap-* into one dir; fetch_bootstrap
      # looks up by <key>.tar.zst.
      - uses: actions/download-artifact@v4
        with:
          pattern: pr-bootstrap-*
          path: _pr_bootstrap_cache/
          merge-multiple: true
      - uses: ./actions/publish-recipe
        with:
          recipe: ${{ matrix.recipe }}
          version: ${{ matrix.version }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          dry-run: 'true'
        env:
          # Point fetch_bootstrap at the staged artifacts.
          RECIPE_CACHE_BASE: file://${{ github.workspace }}/_pr_bootstrap_cache
