name: verify

# PR-time sanity checks for the recipe cache contract. All jobs run
# read-only — no upload risk if the PR comes from a fork.
#
# Deliberately omits the full recipe build (~30 min for asan). That
# coverage happens at merge time via publish-recipe.yml's push trigger;
# the jobs here catch the cheap-to-detect contract failures before merge.
on:
  pull_request:
    paths:
      - 'cells.yaml'
      - 'recipes/**'
      - 'actions/**'
      - 'bin/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  lint-actions:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        run: |
          docker run --rm \
            -v "$PWD":/repo -w /repo \
            rhysd/actionlint:latest -color

  recipe-yaml-no-dead-fields:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Every recipe.yaml top-level key is read somewhere
        # Catches the drift the red-team review flagged: decorative
        # fields silently accumulating in recipe.yaml that nothing
        # consumes. Every top-level key must appear in at least one
        # of: the recipe's build.sh, the actions, or bin/.
        #
        # We deliberately use `for key in $(...)` rather than `while
        # read` so the loop runs in the parent shell and `fail=1` is
        # visible after the loop. Recipe keys are simple identifiers
        # so word-splitting on $(...) is safe here.
        run: |
          set -uo pipefail
          fail=0
          for r in recipes/*/recipe.yaml; do
            recipe_dir="$(dirname "$r")"
            keys=$(grep -E '^[a-z_]+:' "$r" | sed -E 's/:.*//' | sort -u)
            for key in $keys; do
              # Look in the recipe's own build script (build.py or build.sh)
              # plus all action / lib / bin sources. -F = fixed string,
              # -r = recursive (acts on the dir or single file).
              if ! grep -q -r -F "$key" \
                "$recipe_dir" \
                actions/setup-recipe/ \
                actions/publish-recipe/ \
                actions/lib/ \
                bin/ 2>/dev/null; then
                echo "::error file=$r::dead field '$key' (not read by build script, actions, or bin)"
                fail=1
              fi
            done
          done
          exit $fail

  cells-yaml-integrity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Schema parse
        # cells.yaml is the single source of truth for what publish-recipe
        # warms and what prune-cache keeps. All later checks here build
        # on a successful parse; no point validating fields if the YAML
        # itself is malformed.
        run: yq -o=json '.' cells.yaml >/dev/null
      - name: Required fields present
        run: |
          set -euo pipefail
          for f in support_window caps cells; do
            if ! yq -e "has(\"$f\")" cells.yaml >/dev/null; then
              echo "::error file=cells.yaml::missing required top-level field: $f"
              exit 1
            fi
          done
          for f in soft_gb hard_gb grace_days; do
            if ! yq -e ".caps | has(\"$f\")" cells.yaml >/dev/null; then
              echo "::error file=cells.yaml::caps missing field: $f"
              exit 1
            fi
          done
      - name: caps sanity
        run: |
          set -euo pipefail
          soft=$(yq '.caps.soft_gb' cells.yaml)
          hard=$(yq '.caps.hard_gb' cells.yaml)
          grace=$(yq '.caps.grace_days' cells.yaml)
          [ "$soft" -lt "$hard" ] || { echo "::error file=cells.yaml::soft_gb ($soft) must be < hard_gb ($hard)"; exit 1; }
          [ "$grace" -gt 0 ]      || { echo "::error file=cells.yaml::grace_days must be > 0"; exit 1; }
      - name: No duplicate cells
        run: |
          set -euo pipefail
          # Serialise each cell to a single JSON line, then look for repeats.
          dupes=$(yq -o=json -I=0 '.cells[]' cells.yaml | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error file=cells.yaml::duplicate cells found:"
            echo "$dupes"
            exit 1
          fi
      - name: Referenced recipes exist with required files
        run: |
          set -euo pipefail
          fail=0
          for r in $(yq '.cells[].recipe' cells.yaml | sort -u); do
            dir="recipes/$r"
            if [ ! -d "$dir" ]; then
              echo "::error file=cells.yaml::references recipe '$r' but $dir does not exist"
              fail=1
              continue
            fi
            if [ ! -f "$dir/recipe.yaml" ]; then
              echo "::error file=$dir::recipe '$r' missing recipe.yaml"
              fail=1
            fi
            # Build script: build.py preferred, build.sh tolerated for
            # any recipe still on bash. compute_key.py picks the same way.
            if [ ! -f "$dir/build.py" ] && [ ! -f "$dir/build.sh" ]; then
              echo "::error file=$dir::recipe '$r' has no build.py or build.sh"
              fail=1
            fi
          done
          exit $fail
      - name: No orphan recipe directories
        # Catches recipes/ subdirs that aren't referenced by cells.yaml.
        # An orphan recipe directory is dead weight — it's never built,
        # never published, but its contents still feed compute-key parity
        # tests etc. Force the maintainer to either add a cell or remove
        # the directory.
        #
        # Exception: recipes that are intentionally PR-time fixtures
        # (llvm-dry-run) live in recipes/ but never publish steady-state
        # assets. Whitelist them by recipe name.
        run: |
          set -euo pipefail
          fixtures='llvm-dry-run'
          referenced=$(yq '.cells[].recipe' cells.yaml | sort -u)
          actual=$(for d in recipes/*/; do [ -d "$d" ] && basename "$d"; done | sort -u)
          actual_filtered=$(echo "$actual" | grep -vxFf <(echo "$fixtures") || true)
          orphans=$(comm -23 <(echo "$actual_filtered") <(echo "$referenced"))
          if [ -n "$orphans" ]; then
            echo "::error::recipe directories not referenced by any cell in cells.yaml:"
            echo "$orphans"
            exit 1
          fi

  # Cross-OS unit tests for every Python module in the recipe pipeline.
  # Each function has minimal-effective tests (happy path + targeted
  # edge cases) — the publish-dryrun matrix is the broader integration
  # check on top of these. Runs on Linux / macOS / Windows so platform
  # divergences in the Python port surface at PR time. Total wall clock
  # ~2-3 s per leg.
  python-unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, macos-26-intel, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      - name: actions/lib unit tests
        shell: bash
        working-directory: actions/lib
        run: python3 -W error::ResourceWarning -m unittest discover -p 'test_*.py' -v
      - name: actions/setup-recipe unit tests
        shell: bash
        working-directory: actions/setup-recipe
        run: python3 -W error::ResourceWarning -m unittest discover -p 'test_*.py' -v
      - name: actions/publish-recipe unit tests
        shell: bash
        working-directory: actions/publish-recipe
        run: python3 -W error::ResourceWarning -m unittest discover -p 'test_*.py' -v
      - name: bin/ CLI tests
        shell: bash
        working-directory: bin
        run: python3 -W error::ResourceWarning -m unittest discover -p 'test_*.py' -v

  # End-to-end dry-run of the real publish-recipe action against the
  # llvm-dry-run fixture recipe with cache-base: file:///... so no
  # actual upload happens. Covers exactly the steps publish-recipe.yml's
  # validate-on-pr skips under `dry-run: true`: manifest write, cache_pack
  # (tar/zstd portability across BSD/GNU tar, zstd flag drift),
  # cache_upload's file:// branch, and the asset+manifest landing on
  # disk. validate-on-pr covers the build path; this covers the upload
  # path; together they cover the full publish pipeline at PR time.
  #
  # Doesn't catch: llvm_build::smoke (find_package post-publish);
  # cache_upload's gh release branch (no upload to GitHub here);
  # setup-recipe consumer side; prune-cache (separate workflow).
  #
  # No Windows leg yet: install-build-deps's MSVC env wiring works,
  # but the dry-run recipe uses host targets; on Windows that means
  # cl + LLVMDemangle. Added in a follow-up.
  publish-dryrun:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26, macos-26-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      - name: Run publish-recipe action against llvm-dry-run (file:// backend)
        uses: ./actions/publish-recipe
        with:
          recipe: llvm-dry-run
          version: '22'
          os: ${{ matrix.os }}
          arch: x86_64
          cache-base: file://${{ runner.temp }}/dryrun_cache/
      - name: Verify asset + manifest landed
        shell: bash
        run: |
          set -euo pipefail
          key=$(python3 actions/setup-recipe/compute_key.py \
            llvm-dry-run 22 ${{ matrix.os }} x86_64 | sed 's/^key=//')
          ls -la "$RUNNER_TEMP/dryrun_cache/"
          test -f "$RUNNER_TEMP/dryrun_cache/${key}.tar.zst"
          test -f "$RUNNER_TEMP/dryrun_cache/${key}.manifest.json"
          # Round-trip the asset to confirm it's well-formed end to end.
          # Use Python's tarfile + cache_io.cache_download — same code
          # path consumers use, no `tar` binary involvement.
          mkdir extract
          python3 actions/lib/cache_io.py download \
            "file://$RUNNER_TEMP/dryrun_cache" "$key" extract
          test -f extract/llvm-project/lib/cmake/llvm/LLVMConfig.cmake
          echo "::notice::publish-dryrun OK on ${{ matrix.os }}"

  # setup-llvm flavor=system smoke. Exercises the apt-llvm.org path
  # with an older LLVM major (20) that's been stable on apt-llvm.org
  # for noble for a long time, so the install should reliably succeed.
  # Asserts:
  #   - source output reports package-manager
  #   - prefix is a symlink (not a real directory) — catches a
  #     regression where the install lands at a real path
  #   - LLVMConfig.cmake is reachable through it
  # The second invocation step is a regression test for the
  # symlink-over-directory bug: `ln` without `rm -rf` first fails on
  # the second call when the first left a real symlink at the path.
  #
  # Default-flavor smoke (recipe-cache path) is NOT included here:
  # setup-llvm's internal `uses: compiler-research/...@main` would
  # resolve to upstream main, which doesn't see this PR's
  # llvm-release recipe. publish-recipe.yml's validate-on-pr already
  # builds + caches the recipe end-to-end at PR time, which covers
  # the recipe path indirectly.
  setup-llvm-system-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: flavor=system smoke (apt-llvm.org llvm-20)
        id: first
        uses: ./actions/setup-llvm
        with:
          version: '20'
          os: ubuntu-24.04
          arch: x86_64
          flavor: system
      - name: Assert source=package-manager + symlink + LLVMConfig.cmake
        shell: bash
        env:
          SOURCE: ${{ steps.first.outputs.source }}
          PREFIX: ${{ steps.first.outputs.prefix }}
        run: |
          set -euo pipefail
          if [[ "$SOURCE" != "package-manager" ]]; then
            echo "::error::expected source=package-manager, got '$SOURCE'"
            exit 1
          fi
          if [[ ! -L "$PREFIX" ]]; then
            echo "::error::expected $PREFIX to be a symlink, got $(stat -c '%F' "$PREFIX" 2>/dev/null || echo 'missing')"
            exit 1
          fi
          test -f "$PREFIX/lib/cmake/llvm/LLVMConfig.cmake" || {
            echo "::error::LLVMConfig.cmake missing under $PREFIX"
            ls -la "$PREFIX/lib/cmake/llvm/" || true
            exit 1
          }
          echo "::notice::flavor=system smoke OK: source=$SOURCE prefix=$PREFIX"
      - name: Idempotency (re-invoke against existing symlink)
        id: second
        uses: ./actions/setup-llvm
        with:
          version: '20'
          os: ubuntu-24.04
          arch: x86_64
          flavor: system
      - name: Assert second invocation also reports source=package-manager
        shell: bash
        env:
          SOURCE: ${{ steps.second.outputs.source }}
        run: |
          set -euo pipefail
          if [[ "$SOURCE" != "package-manager" ]]; then
            echo "::error::idempotency regression: expected source=package-manager, got '$SOURCE'"
            exit 1
          fi
          echo "::notice::flavor=system idempotency OK"

