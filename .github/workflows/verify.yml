name: verify

# PR-time sanity checks for the recipe cache contract. All jobs run
# read-only — no upload risk if the PR comes from a fork.
#
# Deliberately omits the full recipe build (~30 min for asan). That
# coverage happens at merge time via publish-recipe.yml's push trigger;
# the jobs here catch the cheap-to-detect contract failures before merge.
on:
  pull_request:
    paths:
      - 'cells.yaml'
      - 'recipes/**'
      - 'actions/**'
      - 'bin/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  lint-actions:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        run: |
          docker run --rm \
            -v "$PWD":/repo -w /repo \
            rhysd/actionlint:latest -color

  compute-key-parity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Identical key from repo root and from sparse-checkout subdir
        run: |
          set -euo pipefail
          a="$(bash actions/setup-recipe/compute-key.sh llvm-asan 22 ubuntu-24.04 x86_64)"
          mkdir -p /tmp/sim/__ci_workflows__
          rsync -a recipes /tmp/sim/__ci_workflows__/
          rsync -a actions /tmp/sim/__ci_workflows__/
          b="$(cd /tmp/sim/__ci_workflows__ && bash actions/setup-recipe/compute-key.sh llvm-asan 22 ubuntu-24.04 x86_64)"
          c="$(bash actions/setup-recipe/compute-key.sh llvm-asan 22 ubuntu-24.04 x86_64 "$PWD/recipes")"
          [ "$a" = "$b" ] || { echo "::error::root vs subdir key mismatch: $a vs $b"; exit 1; }
          [ "$a" = "$c" ] || { echo "::error::relative vs absolute recipe_root mismatch: $a vs $c"; exit 1; }
          echo "OK: $a"
      - name: Each input perturbation moves the key
        run: |
          set -euo pipefail
          base="$(bash actions/setup-recipe/compute-key.sh llvm-asan 22 ubuntu-24.04 x86_64)"
          for change in version os arch; do
            case "$change" in
              version) k="$(bash actions/setup-recipe/compute-key.sh llvm-asan 99 ubuntu-24.04 x86_64)" ;;
              os)      k="$(bash actions/setup-recipe/compute-key.sh llvm-asan 22 macos-26     x86_64)" ;;
              arch)    k="$(bash actions/setup-recipe/compute-key.sh llvm-asan 22 ubuntu-24.04 arm64)"  ;;
            esac
            [ "$base" != "$k" ] || { echo "::error::$change perturbation did not move key"; exit 1; }
          done
          # Perturb recipe.yaml content.
          echo "# verify-test perturbation" >> recipes/llvm-asan/recipe.yaml
          k="$(bash actions/setup-recipe/compute-key.sh llvm-asan 22 ubuntu-24.04 x86_64)"
          [ "$base" != "$k" ] || { echo "::error::recipe.yaml edit did not move key"; exit 1; }
          # Restore for any later steps in this job (paranoia).
          git checkout -- recipes/llvm-asan/recipe.yaml
          echo "OK: all perturbations moved the key"

  manifest-schema:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: build-manifest.sh emits valid JSON
        run: |
          set -euo pipefail
          export SRC_COMMIT=mock-src GITHUB_SHA=mock-ci ImageOS=mock-os ImageVersion=mock-ver
          bash actions/publish-recipe/build-manifest.sh \
            llvm-asan 22 ubuntu-24.04 x86_64 mock-key | jq -e .

  recipe-yaml-no-dead-fields:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Every recipe.yaml top-level key is read somewhere
        # Catches the drift the red-team review flagged: decorative
        # fields silently accumulating in recipe.yaml that nothing
        # consumes. Every top-level key must appear in at least one
        # of: the recipe's build.sh, the actions, or bin/.
        #
        # We deliberately use `for key in $(...)` rather than `while
        # read` so the loop runs in the parent shell and `fail=1` is
        # visible after the loop. Recipe keys are simple identifiers
        # so word-splitting on $(...) is safe here.
        run: |
          set -uo pipefail
          fail=0
          for r in recipes/*/recipe.yaml; do
            recipe_dir="$(dirname "$r")"
            keys=$(grep -E '^[a-z_]+:' "$r" | sed -E 's/:.*//' | sort -u)
            for key in $keys; do
              if ! grep -q -r -F "$key" \
                "$recipe_dir/build.sh" \
                actions/setup-recipe/ \
                actions/publish-recipe/ \
                actions/lib/ \
                bin/ 2>/dev/null; then
                echo "::error file=$r::dead field '$key' (not read by build.sh, actions, or bin)"
                fail=1
              fi
            done
          done
          exit $fail

  cells-yaml-integrity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Schema parse
        # cells.yaml is the single source of truth for what publish-recipe
        # warms and what prune-cache keeps. All later checks here build
        # on a successful parse; no point validating fields if the YAML
        # itself is malformed.
        run: yq -o=json '.' cells.yaml >/dev/null
      - name: Required fields present
        run: |
          set -euo pipefail
          for f in support_window caps cells; do
            if ! yq -e "has(\"$f\")" cells.yaml >/dev/null; then
              echo "::error file=cells.yaml::missing required top-level field: $f"
              exit 1
            fi
          done
          for f in soft_gb hard_gb grace_days; do
            if ! yq -e ".caps | has(\"$f\")" cells.yaml >/dev/null; then
              echo "::error file=cells.yaml::caps missing field: $f"
              exit 1
            fi
          done
      - name: caps sanity
        run: |
          set -euo pipefail
          soft=$(yq '.caps.soft_gb' cells.yaml)
          hard=$(yq '.caps.hard_gb' cells.yaml)
          grace=$(yq '.caps.grace_days' cells.yaml)
          [ "$soft" -lt "$hard" ] || { echo "::error file=cells.yaml::soft_gb ($soft) must be < hard_gb ($hard)"; exit 1; }
          [ "$grace" -gt 0 ]      || { echo "::error file=cells.yaml::grace_days must be > 0"; exit 1; }
      - name: No duplicate cells
        run: |
          set -euo pipefail
          # Serialise each cell to a single JSON line, then look for repeats.
          dupes=$(yq -o=json -I=0 '.cells[]' cells.yaml | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error file=cells.yaml::duplicate cells found:"
            echo "$dupes"
            exit 1
          fi
      - name: Referenced recipes exist with required files
        run: |
          set -euo pipefail
          fail=0
          for r in $(yq '.cells[].recipe' cells.yaml | sort -u); do
            dir="recipes/$r"
            if [ ! -d "$dir" ]; then
              echo "::error file=cells.yaml::references recipe '$r' but $dir does not exist"
              fail=1
              continue
            fi
            for f in recipe.yaml build.sh; do
              if [ ! -f "$dir/$f" ]; then
                echo "::error file=$dir::recipe '$r' missing $f"
                fail=1
              fi
            done
          done
          exit $fail
      - name: No orphan recipe directories
        # Catches recipes/ subdirs that aren't referenced by cells.yaml.
        # An orphan recipe directory is dead weight — it's never built,
        # never published, but its contents still feed compute-key parity
        # tests etc. Force the maintainer to either add a cell or remove
        # the directory.
        run: |
          set -euo pipefail
          referenced=$(yq '.cells[].recipe' cells.yaml | sort -u)
          actual=$(for d in recipes/*/; do [ -d "$d" ] && basename "$d"; done | sort -u)
          orphans=$(comm -23 <(echo "$actual") <(echo "$referenced"))
          if [ -n "$orphans" ]; then
            echo "::error::recipe directories not referenced by any cell in cells.yaml:"
            echo "$orphans"
            exit 1
          fi

  tar-zstd-round-trip:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd
      - name: Tiny tree round-trip via the publish/consume pipelines
        run: |
          set -euo pipefail
          # Mirror the install-tree shape that real recipes produce:
          # bin/, lib/, include/, lib/cmake/llvm/. The contents here are
          # synthetic — what we're testing is tar+zstd, not the layout.
          mkdir -p src/llvm-project/lib src/llvm-project/include
          echo "header" > src/llvm-project/include/foo.h
          printf 'binary\x00\x01\x02' > src/llvm-project/lib/libfoo.a
          ( cd src && tar -cf - llvm-project | zstd -19 --long > /tmp/c.tar.zst )
          mkdir dest
          cat /tmp/c.tar.zst | zstd -d | tar -xf - -C dest
          diff -r src/llvm-project dest/llvm-project

  # Smoke-tests recipes/llvm-asan against the install-build-deps
  # toolchain by running the recipe's own build.sh in
  # RECIPE_QUICK_CHECK mode. Catches the publish-time failure mode
  # where the runner's default c++ rejects LLVM_USE_SANITIZER's
  # Clang-only UBSan flags. Costs a git clone + cmake configure +
  # one tiny library compile (~3-5 min); slower than the other
  # verify jobs but cheap insurance against another 30-min publish
  # blowing up post-merge.
  llvm-asan-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/install-build-deps
      - name: Configure + build LLVMDemangle (RECIPE_QUICK_CHECK)
        env:
          RECIPE_VERSION: '22'
          WORK_DIR: ${{ github.workspace }}/_recipe_work
          OUT_DIR: ${{ github.workspace }}/_recipe_out
          RECIPE_QUICK_CHECK: '1'
        run: |
          mkdir -p "$WORK_DIR" "$OUT_DIR"
          bash recipes/llvm-asan/build.sh

  end-to-end-fixture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y zstd jq
      - name: Pack + get round-trip via the CLI
        # Synthesises a fake recipe directory, builds it via the CLI,
        # then fetches it back. Catches contract breaks across
        # compute-key, cache-io, and the CLI itself in one ~10-second
        # pass — without the 30-min real-recipe build cost.
        run: |
          set -euo pipefail
          export RECIPE_CACHE_DIR=/tmp/cache
          mkdir -p recipes/__verify_fixture
          cat > recipes/__verify_fixture/recipe.yaml <<'EOF'
          recipe: __verify_fixture
          description: synthetic fixture used by verify.yml end-to-end-fixture job
          source:
            repo: file:///none
            branch_template: 'none-{version}'
          EOF
          cat > recipes/__verify_fixture/build.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          mkdir -p "$OUT_DIR/llvm-project/bin"
          echo "fake clang built by recipe v${RECIPE_VERSION}" \
            > "$OUT_DIR/llvm-project/bin/clang"
          EOF
          chmod +x recipes/__verify_fixture/build.sh
          bin/recipe-cache build __verify_fixture 1 ubuntu-24.04 x86_64
          bin/recipe-cache list
          mkdir /tmp/out
          bin/recipe-cache get __verify_fixture 1 ubuntu-24.04 x86_64 --out /tmp/out
          test -f /tmp/out/llvm-project/bin/clang
          grep -q "fake clang built by recipe v1" /tmp/out/llvm-project/bin/clang
          # Manifest sanity
          jq -e .recipe "/tmp/cache/$(bin/recipe-cache key __verify_fixture 1 ubuntu-24.04 x86_64).manifest.json"
      - name: Negative — get on uncached key fails
        # The CLI's get without --build-on-miss is the same code shape
        # as setup-recipe's "fail on miss when build-on-miss=false"
        # path. Exercising it via the CLI keeps the test self-contained
        # (no need to invoke the action against an external ref).
        run: |
          set -euo pipefail
          export RECIPE_CACHE_DIR=/tmp/cache-empty
          if bin/recipe-cache get __verify_fixture 999 ubuntu-24.04 x86_64 --out /tmp/never 2>/dev/null; then
            echo "::error::recipe-cache get should have failed for unknown key"
            exit 1
          fi
      - name: patches/ folds into the cache key
        # No real recipe ships patches today (cling will be the first).
        # Cover the code path now so cling's patches/ gets cache-key
        # treatment correctly when it lands.
        run: |
          set -euo pipefail
          key_no_patch="$(bin/recipe-cache key __verify_fixture 1 ubuntu-24.04 x86_64)"
          mkdir -p recipes/__verify_fixture/patches
          echo "diff goes here" > recipes/__verify_fixture/patches/foo.patch
          key_with_patch="$(bin/recipe-cache key __verify_fixture 1 ubuntu-24.04 x86_64)"
          if [ "$key_no_patch" = "$key_with_patch" ]; then
            echo "::error::adding patches/foo.patch did not move the key"
            exit 1
          fi
          # Editing the patch content also moves the key.
          echo "different diff" > recipes/__verify_fixture/patches/foo.patch
          key_changed="$(bin/recipe-cache key __verify_fixture 1 ubuntu-24.04 x86_64)"
          if [ "$key_with_patch" = "$key_changed" ]; then
            echo "::error::editing patches/foo.patch did not move the key"
            exit 1
          fi

  url-parser:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: gh_release_url_parse handles trailing slash, missing slash, non-github
        # Unit test for the URL parser. The full upload path can't run
        # from a fork PR (no release-write token); this covers the slug
        # arithmetic that the action would otherwise feed to gh.
        run: |
          set -euo pipefail
          source actions/lib/cache-io.sh
          fail=0
          assert_parse() {
            local input="$1" want_owner="$2" want_tag="$3" desc="$4"
            local out
            if ! out=$(gh_release_url_parse "$input"); then
              echo "::error::parse failed for $desc: $input"
              fail=1
              return
            fi
            local got_owner="${out%$'\t'*}"
            local got_tag="${out#*$'\t'}"
            if [ "$got_owner" != "$want_owner" ] || [ "$got_tag" != "$want_tag" ]; then
              echo "::error::$desc: parsed ($got_owner, $got_tag), want ($want_owner, $want_tag)"
              fail=1
            fi
          }
          assert_reject() {
            local input="$1" desc="$2"
            if gh_release_url_parse "$input" >/dev/null 2>&1; then
              echo "::error::$desc: $input was accepted, should have been rejected"
              fail=1
            fi
          }
          assert_parse "https://github.com/foo/bar/releases/download/cache/" "foo/bar" "cache" "trailing slash"
          assert_parse "https://github.com/foo/bar/releases/download/cache"  "foo/bar" "cache" "no trailing slash"
          assert_parse "https://github.com/compiler-research/ci-workflows/releases/download/v1" \
                       "compiler-research/ci-workflows" "v1" "real-world URL"
          assert_reject "file:///some/path"               "file://"
          assert_reject "https://example.org/foo/bar"     "non-github host"
          assert_reject "https://github.com/foo/bar"      "github URL but not a Releases path"
          exit $fail
