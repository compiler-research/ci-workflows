name: 'Publish recipe'
description: |
  Builds a recipe locally (under ccache) and writes
  cache/<key>.tar.zst + cache/<key>.manifest.json to the configured
  cache backend. Skips work when the asset already exists.

  Default backend is this repo's Releases (`gh release upload`); set
  cache-base to a `file:///abs/path/` URL to write to a local
  directory instead — useful for ad-hoc lab caches and for the
  push-driven CI on this repo running through act.

inputs:
  recipe:
    required: true
  version:
    required: true
  os:
    required: true
    description: 'OS slug for the cache key (e.g. "ubuntu-24.04", "macos-26"). Must match what setup-recipe consumers will pass.'
  arch:
    required: true
    description: 'Arch slug for the cache key (e.g. "x86_64", "arm64").'
  cache-base:
    required: false
    default: ''
    description: |
      Where to write the asset. Empty (default) uses RECIPE_CACHE_BASE
      env var if set, otherwise this repo's Releases cache. Supports
      file:///abs/path and https://github.com/<owner>/<repo>/releases/download/<tag>/
  dry-run:
    required: false
    default: 'false'
    description: |
      'true' for PR validation: restore ccache, run the recipe build,
      skip the manifest + tar + upload steps. Lets a PR exercise the
      end-to-end build path against the proposed recipe content
      without touching Releases. Combined with the ccache-action
      restore above, builds that have a warm coarse-keyed ccache
      complete in minutes.

runs:
  using: composite
  steps:
    - name: Normalize OS/arch slugs
      id: slugs
      shell: bash
      env:
        IN_OS: ${{ inputs.os }}
        IN_ARCH: ${{ inputs.arch }}
      run: |
        os="$(echo "$IN_OS" | tr '[:upper:]' '[:lower:]')"
        arch="$(echo "$IN_ARCH" | tr '[:upper:]' '[:lower:]')"
        echo "os=$os" >> "$GITHUB_OUTPUT"
        echo "arch=$arch" >> "$GITHUB_OUTPUT"

    - name: Compute key
      id: compute-key
      shell: bash
      env:
        RECIPE: ${{ inputs.recipe }}
        VERSION: ${{ inputs.version }}
        OS: ${{ steps.slugs.outputs.os }}
        ARCH: ${{ steps.slugs.outputs.arch }}
      run: |
        python3 actions/setup-recipe/compute_key.py \
          "$RECIPE" "$VERSION" "$OS" "$ARCH" >> "$GITHUB_OUTPUT"

    # Why: workflow_dispatch can fire against a key that's already
    # published (operator retrying, or someone manually warming a cell
    # that's already there). HEAD probe + skip avoids a redundant
    # 30-min rebuild. The upload step still uses --clobber as a defense
    # against parallel-dispatch races where two runs probe-miss together.
    - name: Skip if asset already published
      id: skip
      shell: bash
      env:
        KEY: ${{ steps.compute-key.outputs.key }}
        EXPLICIT_BASE: ${{ inputs.cache-base }}
        DEFAULT_GH_BASE: https://github.com/${{ github.repository }}/releases/download/cache/
      run: |
        # The default for the *publish* path is this repo's own Releases,
        # not the upstream ci-workflows one. cache_io.resolve_cache_base
        # falls back to the upstream default when no override is set,
        # which is wrong for forks; force the github.repository-derived
        # URL when neither inputs nor env supply one.
        base="${EXPLICIT_BASE:-${RECIPE_CACHE_BASE:-$DEFAULT_GH_BASE}}"
        echo "base=$base" >> "$GITHUB_OUTPUT"
        if python3 actions/lib/cache_io.py probe "$base" "$KEY"; then
          echo "::notice::cache hit; skipping build for key=${KEY}"
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    # ccache key matches the Releases content-hash so PR runs hit
    # main's saved entry as long as recipe.yaml / build.{sh,py} /
    # patches / actions/lib didn't move. restore-keys falls back to
    # the most recent prior content-hash on the same cell so a
    # recipe-content edit still warm-starts off the previous ccache.
    # save runs only on a primary-key miss, so the cache pool holds at
    # most one entry per (recipe x version x os x arch x content-hash)
    # tuple instead of one per run.
    #
    # CCACHE_DIR is pinned so the same path is restored, cached and
    # consumed by ccache during the build (avoiding the action's
    # implicit OS-specific defaults).
    - name: Configure CCACHE_DIR
      if: steps.skip.outputs.exists != 'true'
      shell: bash
      env:
        WS: ${{ github.workspace }}
      run: |
        echo "CCACHE_DIR=${WS}/.ccache" >> "$GITHUB_ENV"

    - name: Restore ccache
      if: steps.skip.outputs.exists != 'true'
      uses: actions/cache/restore@v4
      id: ccache
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ steps.compute-key.outputs.key }}
        restore-keys: |
          ccache-${{ inputs.recipe }}-${{ inputs.version }}-${{ steps.slugs.outputs.os }}-${{ steps.slugs.outputs.arch }}-

    # Surface why the build may compile cold even though a cache exists
    # for this cell. Only emits when the exact-match primary key didn't
    # restore (cache-hit=false); silent on a clean primary hit.
    - name: Warn on ccache primary miss
      if: steps.skip.outputs.exists != 'true' && steps.ccache.outputs.cache-hit != 'true'
      shell: bash
      env:
        WANTED: ccache-${{ steps.compute-key.outputs.key }}
        MATCHED: ${{ steps.ccache.outputs.cache-matched-key }}
      run: |
        if [ -z "$MATCHED" ]; then
          echo "::warning title=ccache cold start::no cache matched '$WANTED'; no prior content-hash cache and no cell-prefix fallback for this cell. Build will cold-compile every translation unit."
        else
          echo "::warning title=ccache primary miss::wanted '$WANTED', restored '$MATCHED'. The exact-match cache for this content hash isn't in the GHA cache pool (not yet saved, or LRU-evicted). Restore fell back to the cell prefix; ccache entries written under a different recipe content / compile flags may not hit current lookups."
        fi

    - name: Configure ccache (5G cap)
      if: steps.skip.outputs.exists != 'true'
      shell: bash
      run: |
        mkdir -p "$CCACHE_DIR"
        ccache --max-size=5G
        ccache --zero-stats

    # Decouple the ccache key from runner-local state so the sibling
    # asset is reusable off-runner. Skipped on Windows: `cl` rejects
    # `--version`, and the sibling upload is already Windows-gated.
    - name: Configure ccache portable hashing
      if: steps.skip.outputs.exists != 'true' && runner.os != 'Windows'
      shell: bash
      env:
        WS: ${{ github.workspace }}
      run: |
        cc_version=$("$CC" --version | head -1)
        ccache --set-config="compiler_check=string:$cc_version"
        ccache --set-config="hash_dir=false"
        ccache --set-config="base_dir=$WS"

    # Only github-Releases backends need a Release object created up
    # front. file:// backends just need the directory to exist; the
    # cache_upload helper handles that.
    - name: Ensure rolling Release exists (gh backend only)
      if: steps.skip.outputs.exists != 'true' && inputs.dry-run != 'true' && startsWith(steps.skip.outputs.base, 'https://github.com/')
      shell: bash
      env:
        BASE: ${{ steps.skip.outputs.base }}
        GH_TOKEN: ${{ github.token }}
      run: |
        parsed="$(python3 actions/lib/cache_io.py release-url-parse "$BASE")"
        owner_repo="${parsed%$'\t'*}"
        tag="${parsed#*$'\t'}"
        if ! gh release view "$tag" -R "$owner_repo" >/dev/null 2>&1; then
          gh release create "$tag" -R "$owner_repo" \
            --title "Recipe cache" \
            --notes "Rolling cache of prebuilt recipe artifacts. Each asset is keyed by sha256 of (recipe.yaml, build.{sh,py}, patches, version, os, arch). See <key>.manifest.json for the inputs that produced any given <key>.tar.zst."
        fi

    - name: Build recipe
      if: steps.skip.outputs.exists != 'true'
      shell: bash
      env:
        RECIPE_VERSION: ${{ inputs.version }}
        WORK_DIR: ${{ github.workspace }}/_recipe_work
        OUT_DIR: ${{ github.workspace }}/_recipe_out
        CMAKE_C_COMPILER_LAUNCHER: ccache
        CMAKE_CXX_COMPILER_LAUNCHER: ccache
      run: |
        mkdir -p "$WORK_DIR" "$OUT_DIR"
        # Dispatch by recipe build script: prefer build.py (Python,
        # native on every OS) over build.sh (bash, requires git-bash
        # on Windows and trips on bash 3.2 quirks on macOS). Recipes
        # migrate one at a time.
        if [[ -f "recipes/${{ inputs.recipe }}/build.py" ]]; then
          python3 "recipes/${{ inputs.recipe }}/build.py"
        else
          bash "recipes/${{ inputs.recipe }}/build.sh"
        fi

    # Surfaces miss-rate in the run log + the workflow summary. If
    # the notice persistently shows ~100% miss, the primary key
    # (compute-key content-hash) is no longer tracking the source
    # closely enough and the key composition needs revisiting.
    - name: ccache --show-stats
      if: steps.skip.outputs.exists != 'true'
      shell: bash
      run: |
        ccache --show-stats
        # Pull headline counters into a ::notice:: so the workflow
        # summary shows hit/miss without scrolling the full step log.
        # Parses the ccache 4.x text format ("Hits: N / total" and
        # "Misses: N"); missing fields default to 0.
        stats="$(ccache --show-stats 2>/dev/null || true)"
        hits=$(echo "$stats"   | awk '/^[[:space:]]*Hits:[[:space:]]+[0-9]/   { print $2; exit }')
        misses=$(echo "$stats" | awk '/^[[:space:]]*Misses:[[:space:]]+[0-9]/ { print $2; exit }')
        : "${hits:=0}" "${misses:=0}"
        total=$(( hits + misses ))
        if [ "$total" -gt 0 ]; then
          rate=$(( hits * 100 / total ))
          echo "::notice title=ccache hit rate::$rate% (hits=$hits, misses=$misses)"
        else
          echo "::notice title=ccache hit rate::no compiles routed through ccache (total=0)"
        fi

    # Dry-run saves too: the content-hash key is per (recipe x version
    # x os x arch x recipe-content), so a PR that touches recipe.yaml /
    # build.{sh,py} / patches / actions/lib gets its own entry; a PR
    # that doesn't simply hits main's. No timestamp-suffixed pile-up.
    - name: Save ccache
      if: steps.skip.outputs.exists != 'true' && steps.ccache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ${{ steps.ccache.outputs.cache-primary-key }}

    - name: Build manifest
      if: steps.skip.outputs.exists != 'true' && inputs.dry-run != 'true'
      shell: bash
      env:
        KEY: ${{ steps.compute-key.outputs.key }}
        RECIPE: ${{ inputs.recipe }}
        VERSION: ${{ inputs.version }}
        OS: ${{ steps.slugs.outputs.os }}
        ARCH: ${{ steps.slugs.outputs.arch }}
        WORK_DIR: ${{ github.workspace }}/_recipe_work
      run: |
        python3 actions/publish-recipe/build_manifest.py \
          "$RECIPE" "$VERSION" "$OS" "$ARCH" "$KEY" \
          > "${{ github.workspace }}/_recipe_out/${KEY}.manifest.json"

    - name: Tar + zstd + upload
      if: steps.skip.outputs.exists != 'true' && inputs.dry-run != 'true'
      shell: bash
      env:
        KEY: ${{ steps.compute-key.outputs.key }}
        BASE: ${{ steps.skip.outputs.base }}
        GH_TOKEN: ${{ github.token }}
      run: |
        REPO_ROOT="$(pwd)"
        cd "${{ github.workspace }}/_recipe_out"
        # Python tarfile + zstd: no `tar` binary, no GNU/BSD flag drift.
        python3 "$REPO_ROOT/actions/lib/cache_io.py" pack . "$KEY"
        ls -lh "${KEY}.tar.zst"
        # The notice URL: $BASE is the asset *prefix*
        # (https://.../releases/download/cache/) which 404s when clicked
        # because that exact path doesn't serve content. Show the
        # release-page URL (.../releases/tag/cache) so a reviewer
        # clicking the notice in the GHA log lands on the actual
        # release. file:// backends fall through to the raw $BASE.
        release_url="$BASE"
        if parsed="$(python3 "$REPO_ROOT/actions/lib/cache_io.py" release-url-parse "$BASE" 2>/dev/null)"; then
          owner_repo="${parsed%$'\t'*}"
          tag="${parsed#*$'\t'}"
          release_url="https://github.com/${owner_repo}/releases/tag/${tag}"
        fi
        echo "::notice::uploading ${KEY} to ${release_url}"
        python3 "$REPO_ROOT/actions/lib/cache_io.py" upload \
          "$BASE" "$KEY" "${KEY}.tar.zst" "${KEY}.manifest.json"

    # Sibling asset for bin/repro --with-ccache: ships a snapshot of
    # the recipe build's CCACHE_DIR alongside the install tree under
    # the same content-hash key. Reuses the install tree's manifest;
    # cache_upload accepts no manifest in that case.
    # Windows is gated out for now: bin/repro under nektos/act doesn't
    # target Windows hosts, so the dev-repro consumer of the sibling
    # asset has no Windows use case yet. Skipping here lets us avoid
    # the chocolatey zstandard package's recurrent 404s on the publish
    # path; revisit on demand.
    - name: Tar + zstd + upload ccache
      if: steps.skip.outputs.exists != 'true' && inputs.dry-run != 'true' && runner.os != 'Windows'
      shell: bash
      env:
        KEY: ${{ steps.compute-key.outputs.key }}
        BASE: ${{ steps.skip.outputs.base }}
        GH_TOKEN: ${{ github.token }}
      run: |
        REPO_ROOT="$(pwd)"
        cd "${{ github.workspace }}"
        python3 "$REPO_ROOT/actions/lib/cache_io.py" pack \
          . "$KEY" . .ccache .ccache
        ls -lh "${KEY}.ccache.tar.zst"
        python3 "$REPO_ROOT/actions/lib/cache_io.py" upload \
          "$BASE" "$KEY" "${KEY}.ccache.tar.zst"
